<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>バイト給料計算</title>
  <link class="favicon" rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="給料計算">
  <meta name="theme-color" content="#ec4899">
  <style id="theme-vars"></style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #fdf0f7; color: #3d1a2e;
      max-width: 480px; margin: 0 auto;
      height: 100%; overflow: hidden; display: flex; flex-direction: column;
    }
    #app { display: flex; flex-direction: column; height: 100%; }

    /* ===== Header ===== */
    header { background: linear-gradient(135deg,#fdd5e8,#f9a8d4); color: #be185d; flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(236,72,153,.15); }
    .header-top { display: flex; align-items: center; padding: 4px 16px 6px; gap: 8px; }
    .header-usagi {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px 4px;
    }
    .usagi-svg {
      width: 38px; height: 38px; flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(236,72,153,.4));
    }
    .header-usagi-text { display: flex; flex-direction: column; }
    .app-title-main {
      font-size: .95rem; font-weight: 800; color: #be185d;
      letter-spacing: .02em;
    }
    .app-title-sub {
      font-size: .62rem; color: #ec4899;
      margin-top: 1px; letter-spacing: .05em;
    }
    .share-btn {
      background: rgba(255,255,255,.35); border: none; color: #be185d;
      width: 34px; height: 34px; border-radius: 50%; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-left: auto;
    }
    .share-btn:active { background: rgba(255,255,255,.55); }
    .nav-btn {
      background: rgba(255,255,255,.5); border: none; color: #be185d;
      width: 34px; height: 34px; border-radius: 50%; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #month-title { flex: 1; text-align: center; font-size: 1.1rem; font-weight: 700; color: white; text-shadow: 0 1px 6px rgba(236,72,153,.3); }
    .tabs { display: flex; border-top: 1px solid rgba(255,255,255,.25); }
    .tab {
      flex: 1; padding: 10px 0; background: none; border: none;
      color: rgba(190,24,93,.5); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: #be185d; border-bottom-color: #be185d; }

    /* ===== Panes ===== */
    .pane { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; flex-direction: column; }
    .pane.active { display: flex; }

    /* ===== Calendar ===== */
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr);
      background: white; border-bottom: 1px solid #fce7f3; flex-shrink: 0; }
    .cal-dow div { text-align: center; padding: 7px 0; font-size: 0.72rem; font-weight: 700; color: #be185d; }
    .cal-dow div:nth-child(1) { color: #e11d48; }
    .cal-dow div:nth-child(7) { color: #db2777; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: #fce7f3; flex: 1; }
    .cal-cell { background: white; min-height: 68px; padding: 4px 3px; cursor: pointer; transition: background .1s; min-width: 0; position: relative; }
    .cal-cell:active { background: #fdf2f8; }
    .cal-cell.other { background: #fff5f9; }
    .cal-cell.sel { background: #fdf2f8; outline: 2px solid #f9a8d4; outline-offset: -2px; }
    .cal-day { width: 22px; height: 22px; border-radius: 50%;
      font-size: .75rem; font-weight: 700; color: #3d1a2e;
      display: flex; align-items: center; justify-content: center; margin-bottom: 2px; pointer-events: none; }
    .cal-cell.other .cal-day { color: #f0abcc; }
    .cal-cell.sun .cal-day { color: #e11d48; }
    .cal-cell.sat .cal-day { color: #db2777; }
    .cal-cell.tod .cal-day { background: #ec4899; color: white !important; }
    .cal-badges { display: flex; flex-direction: column; gap: 2px; pointer-events: none; }
    .cal-badge { font-size: .6rem; font-weight: 700; padding: 1px 3px; border-radius: 3px;
      color: #2d2d2d; line-height: 1.5; width: 100%; box-sizing: border-box;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 2px; pointer-events: none; }
    .badge-t { font-weight: 700; flex-shrink: 0; }
    .badge-time { font-size: .52rem; opacity: .92; overflow: hidden; text-overflow: ellipsis; min-width: 0; }

    /* ===== Summary bar ===== */
    .summary-bar { background: white; border-top: 1px solid #fce7f3; padding: 10px 12px; flex-shrink: 0; }
    .summary-items { display: flex; gap: 6px; }
    .sum-item { flex: 1; background: #fff0f7; border-radius: 10px; padding: 8px 6px; text-align: center; }
    .sum-item-lbl { font-size: .6rem; color: #be185d; margin-bottom: 3px; font-weight: 600; }
    .sum-item-val { font-size: .92rem; font-weight: 800; color: #3d1a2e; }
    .sum-item-val.accent { color: #ec4899; }
    .add-shift-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin: 10px 0 2px;
      padding: 14px;
      background: linear-gradient(135deg, #fdd5e8, #f9a8d4);
      border: none; border-radius: 16px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(236,72,153,.15);
      transition: transform .1s, box-shadow .1s;
    }
    .add-shift-btn:active { transform: scale(.97); box-shadow: 0 2px 6px rgba(236,72,153,.1); }
    .add-shift-icon { font-size: 1.2rem; font-weight: 900; color: #be185d; line-height: 1; }
    .add-shift-label { font-size: .95rem; font-weight: 800; color: #be185d; letter-spacing: .03em; }
    .add-shift-deco { font-size: 1.1rem; }

    /* ===== Bottom sheet ===== */
    .bs-mask { position: fixed; inset: 0; background: rgba(61,26,46,.45);
      z-index: 50; display: flex; align-items: flex-end; }
    .bs-mask.hidden { display: none; }
    .bs-sheet { background: white; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px; margin: 0 auto; max-height: 88vh;
      overflow-y: auto; padding-bottom: 20px; }
    .bs-bar { width: 36px; height: 4px; background: #fce7f3; border-radius: 2px; margin: 12px auto 0; }
    .bs-head { padding: 10px 16px 10px; border-bottom: 1px solid #fce7f3; }
    .bs-head-nav { display: flex; align-items: center; gap: 8px; }
    .bs-nav-btn { width: 30px; height: 30px; font-size: 1.1rem; background: rgba(253,212,232,.5); flex-shrink: 0; }
    .bs-head-date { flex: 1; text-align: center; font-size: 1rem; font-weight: 700; color: #3d1a2e; }
    .bs-head-hint { font-size: .74rem; color: #f9a8d4; margin-top: 4px; text-align: center; }
    .bs-sec-lbl { font-size: .68rem; font-weight: 700; color: #f9a8d4;
      letter-spacing: .06em; padding: 10px 16px 4px; text-transform: uppercase; }
    .bs-reg-row { display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; border-bottom: 1px solid #fff5f9; }
    .bs-reg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .bs-reg-info { flex: 1; }
    .bs-reg-name { font-size: .87rem; font-weight: 600; }
    .bs-reg-time { font-size: .72rem; color: #be185d; }
    .bs-reg-pay { font-size: .87rem; font-weight: 700; color: #ec4899; white-space: nowrap; }
    .bs-del-btn { background: none; border: none; cursor: pointer; color: #f9a8d4; font-size: .9rem; padding: 4px; }
    .bs-del-btn:active { color: #e11d48; }
    .bs-tmpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 6px 16px; }
    .bs-tmpl-btn { padding: 11px 12px; border-radius: 12px; border: none;
      cursor: pointer; text-align: left; transition: opacity .15s; }
    .bs-tmpl-btn:active { opacity: .75; }
    .bs-tmpl-name { font-size: .87rem; font-weight: 700; color: white; }
    .bs-tmpl-time { font-size: .7rem; color: rgba(255,255,255,.85); margin-top: 1px; }
    .bs-tmpl-wp { font-size: .65rem; color: rgba(255,255,255,.7); margin-top: 1px; }
    .bs-act { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 16px; }
    .bs-act-btn { padding: 11px; border-radius: 10px; border: 1.5px dashed #fce7f3;
      background: #fff5f9; cursor: pointer; font-size: .83rem; font-weight: 600; color: #be185d;
      display: flex; align-items: center; justify-content: center; gap: 5px; }
    .bs-act-btn:active { background: #fdf2f8; border-color: #ec4899; color: #ec4899; }
    .bs-form { padding: 10px 16px; }
    .bf-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .bf-row label { font-size: .75rem; color: #be185d; width: 68px; flex-shrink: 0; }
    .bf-row select, .bf-row input { flex: 1; padding: 7px 10px; border: 1px solid #fce7f3;
      border-radius: 7px; font-size: .87rem; outline: none; background: white; }
    .bf-row select:focus, .bf-row input:focus { border-color: #ec4899; }
    .bf-unit { font-size: .75rem; color: #be185d; flex-shrink: 0; }
    .btn-bs-save { width: 100%; padding: 13px; margin-top: 4px;
      background: linear-gradient(135deg,#f9a8d4,#ec4899);
      border: none; border-radius: 12px; color: white; font-size: .95rem; font-weight: 700; cursor: pointer; }
    .bs-foot { padding: 8px 16px 0; }
    .btn-bs-close { width: 100%; padding: 12px; background: #fff0f7; border: none;
      border-radius: 12px; font-size: .9rem; font-weight: 600; color: #be185d; cursor: pointer; }

    /* ===== Detail tab ===== */
    .det-charts { padding: 12px 12px 0; }
    .det-charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .det-chart-card { background: white; border-radius: 14px; padding: 14px;
      box-shadow: 0 2px 8px rgba(236,72,153,.08); }
    .det-chart-card.full { grid-column: 1/-1; }
    .det-chart-title { font-size: .75rem; font-weight: 700; color: #be185d; margin-bottom: 10px; }
    .det-chart-card canvas { max-height: 180px; }
    .chart-toggle-row { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .chart-toggle-icon { font-size: .75rem; color: #f9a8d4; }
    .chart-body.chart-collapsed { display: none; }
    .donut-wrap { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; }
    .donut-wrap canvas { width: 140px !important; height: 140px !important; flex-shrink: 0; flex-grow: 0; }
    .donut-legend { display: flex; flex-direction: column; gap: 10px; justify-content: center; width: 130px; flex-shrink: 0; }
    .donut-legend-row { display: flex; align-items: flex-start; gap: 8px; width: 100%; }
    .donut-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .donut-legend-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .donut-legend-name { font-size: .8rem; color: #3d1a2e; }
    .donut-legend-amt { font-size: .92rem; font-weight: 800; color: #ec4899; display: block; text-align: right; }
    .det-card { background: white; border-radius: 14px; margin: 0 12px 10px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(236,72,153,.08); }
    .det-card:first-of-type { margin-top: 0; }
    .det-card-head { padding: 13px 14px; display: flex; align-items: center;
      gap: 10px; border-bottom: 1px solid #fce7f3; }
    .det-card-toggle { cursor: pointer; user-select: none; }
    .det-card-toggle:active { background: #fff5f9; }
    .det-head-main { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .det-head-top { display: flex; align-items: center; justify-content: space-between; }
    .det-head-sub { display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
    .det-head-sub.hidden { display: none; }
    .det-net-inline { font-size: .85rem; font-weight: 800; color: #ec4899; }
    .det-toggle-icon { font-size: .72rem; color: #f9a8d4; }
    .det-period-open { display: block; }
    .det-period-open.hidden { display: none; }
    .det-card-body.hidden { display: none; }
    .shift-list-toggle {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px; font-size: .78rem; font-weight: 600; color: #f9a8d4;
      cursor: pointer; border-top: 1px solid #fce7f3;
    }
    .shift-list-toggle:active { background: #fff5f9; }
    .slt-icon { font-size: .65rem; }
    .shift-list-body { background: #fff8fb; }
    .shift-list-body.hidden { display: none; }
    .sli {
      display: grid; grid-template-columns: 56px 1fr 36px 64px;
      align-items: center; gap: 6px;
      padding: 7px 14px; border-bottom: 1px solid #fce7f3;
      font-size: .76rem;
    }
    .sli:last-child { border-bottom: none; }
    .sli-date { font-weight: 700; color: #3d1a2e; white-space: nowrap; }
    .sli-dow { font-size: .72rem; color: #f9a8d4; margin-left: 1px; }
    .sli-time { color: #718096; }
    .sli-h { color: #718096; text-align: right; }
    .sli-pay { font-weight: 700; color: #ec4899; text-align: right; }
    .det-dot { width: 12px; height: 12px; border-radius: 50%; }
    .det-name { font-size: .97rem; font-weight: 700; flex: 1; color: #3d1a2e; }
    .det-period { font-size: .72rem; color: #f9a8d4; }
    .det-row { display: flex; justify-content: space-between; padding: 9px 14px;
      border-bottom: 1px solid #fff5f9; font-size: .84rem; }
    .det-row .lbl { color: #be185d; }
    .det-row .val { font-weight: 600; color: #3d1a2e; }
    .det-row.deduct .val { color: #e11d48; }
    .det-row.gross-row { background: #fff5f9; }
    .det-row.gross-row .lbl, .det-row.gross-row .val { font-weight: 700; }
    .det-total { display: flex; justify-content: space-between; align-items: center;
      padding: 13px 14px; background: linear-gradient(135deg,#fdf2f8,#fce7f3);
      border-top: 1px solid #fce7f3; }
    .det-total .lbl { font-size: .88rem; font-weight: 700; color: #be185d; }
    .det-total .val { font-size: 1.25rem; font-weight: 800; color: #ec4899; }
    .det-payday { font-size: .72rem; color: #f9a8d4; text-align: center;
      padding: 6px 14px 8px; background: white; }

    /* ===== Settings tab ===== */
    .set-sec { padding: 12px 12px 0; }
    .set-sec:last-child { padding-bottom: 20px; }
    .set-sec-title { font-size: .68rem; font-weight: 700; color: #f9a8d4;
      text-transform: uppercase; letter-spacing: .06em; padding: 0 2px 6px; }
    .set-list { background: white; border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(236,72,153,.08); }
    .set-item { display: flex; align-items: center; padding: 12px 14px;
      border-bottom: 1px solid #fce7f3; gap: 10px; cursor: pointer; }
    .set-item:last-child { border-bottom: none; }
    .set-item:active { background: #fff0f7; }
    .set-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .set-info { flex: 1; }
    .set-name { font-size: .9rem; font-weight: 600; color: #3d1a2e; }
    .set-sub { font-size: .72rem; color: #f9a8d4; margin-top: 1px; }
    .set-arr { color: #f9a8d4; }
    .set-empty { padding: 16px; text-align: center; font-size: .83rem; color: #f9a8d4; }
    .btn-add { width: 100%; margin-top: 8px; padding: 12px;
      background: white; border: 1.5px dashed #fce7f3; border-radius: 14px;
      color: #ec4899; font-size: .87rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-add:active { background: #fff0f7; border-color: #ec4899; }

    /* ===== Modal ===== */
    .modal-mask { position: fixed; inset: 0; background: rgba(61,26,46,.45);
      z-index: 100; display: flex; align-items: flex-end; }
    .modal-mask.hidden { display: none; }
    .modal-box { background: white; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px; margin: 0 auto;
      max-height: 92vh; display: flex; flex-direction: column; }
    .modal-head { display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid #fce7f3; flex-shrink: 0; }
    .modal-ttl { font-size: 1.05rem; font-weight: 700; color: #3d1a2e; }
    .btn-mclose { width: 28px; height: 28px; background: #fff0f7; border: none;
      border-radius: 50%; cursor: pointer; font-size: .85rem; color: #be185d;
      display: flex; align-items: center; justify-content: center; }
    .modal-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
    .modal-foot { display: flex; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #fce7f3; flex-shrink: 0; }
    .btn-del { padding: 12px 16px; background: #fff5f5; border: none;
      border-radius: 12px; color: #e11d48; font-size: .87rem; font-weight: 600; cursor: pointer; }
    .btn-save { flex: 1; padding: 12px;
      background: linear-gradient(135deg,#f9a8d4,#ec4899); border: none;
      border-radius: 12px; color: white; font-size: .95rem; font-weight: 700; cursor: pointer; }

    /* ===== Modal form ===== */
    .fg { margin-bottom: 13px; }
    .fg label { font-size: .75rem; font-weight: 600; color: #be185d; display: block; margin-bottom: 4px; }
    .fi { width: 100%; padding: 9px 11px; border: 1px solid #fce7f3;
      border-radius: 10px; font-size: .9rem; outline: none; color: #3d1a2e; }
    .fi:focus { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236,72,153,.12); }
    .f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fsec { font-size: .7rem; font-weight: 700; color: #f9a8d4; text-transform: uppercase;
      letter-spacing: .05em; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #fce7f3; }
    .swatches { display: flex; flex-wrap: wrap; gap: 8px; }
    .sw { width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: transform .15s; }
    .sw.on { border-color: #3d1a2e; transform: scale(1.15); }
    .wh-item { display: flex; align-items: center; gap: 6px;
      padding: 7px 10px; background: #fff5f9; border-radius: 10px; margin-bottom: 6px; }
    .wh-item .fi { padding: 6px 9px; font-size: .85rem; }
    .btn-rwage { background: none; border: none; cursor: pointer; color: #f9a8d4; font-size: .85rem; }
    .btn-rwage:active { color: #e11d48; }
    .btn-awage { width: 100%; padding: 8px; background: #fff0f7;
      color: #ec4899; border: 1px dashed #f9a8d4;
      border-radius: 9px; font-size: .82rem; cursor: pointer; margin-bottom: 4px; }
    .tog-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .tog-lbl { font-size: .87rem; font-weight: 600; color: #3d1a2e; }
    .tog { position: relative; width: 44px; height: 24px; }
    .tog input { opacity: 0; width: 0; height: 0; }
    .tog-sl { position: absolute; inset: 0; background: #fce7f3;
      border-radius: 24px; cursor: pointer; transition: background .2s; }
    .tog-sl::before { content: ''; position: absolute; width: 18px; height: 18px;
      border-radius: 50%; background: white; top: 3px; left: 3px; transition: transform .2s; }
    .tog input:checked + .tog-sl { background: #ec4899; }
    .tog input:checked + .tog-sl::before { transform: translateX(20px); }
    .empty { text-align: center; padding: 48px 20px; color: #f9a8d4; }
    .empty-ico { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-txt { font-size: .9rem; }

    /* ===== 手当・控除 独自レイアウト ===== */
    .dyn-item { display: flex; flex-direction: column; background: #fff5f9; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #fce7f3; gap: 8px; }
    .dyn-item .dyn-row-top { display: flex; align-items: center; gap: 6px; }
    .dyn-item .dyn-row-bottom { display: flex; align-items: center; gap: 6px; }
    .btn-rdyn { background: none; border: none; cursor: pointer; color: #f9a8d4; font-size: .95rem; padding: 2px 6px; }
    .btn-rdyn:active { color: #e11d48; }
    .cutoff-item { background: #fff5f9; border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; border: 1px solid #fce7f3; }
    .cutoff-row-inner { display: flex; align-items: flex-end; gap: 8px; }

    /* ===== Day Detail Sheet ===== */
    .dd-sheet {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
      z-index: 40;
      background: white; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px;
      max-height: 60vh; display: flex; flex-direction: column;

// ===== UTILS =====
function uid() { return Math.random().toString(36).slice(2,9); }
function fmt(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function toMin(t) { if (!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }
function ds(y,m,d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayStr() { const d=new Date(); return ds(d.getFullYear(),d.getMonth()+1,d.getDate()); }
function addDay(s,n=1) {
  const d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n);
  return ds(d.getFullYear(),d.getMonth()+1,d.getDate());
}
function daysInMonth(y,m) { return new Date(y,m,0).getDate(); }

// ===== SALARY CALC =====
function getWage(wp, dateS) {
  if (!wp.wageHistory?.length) return wp.baseWage||0;
  const sorted=[...wp.wageHistory].sort((a,b)=>b.startDate.localeCompare(a.startDate));
  const e=sorted.find(x=>x.startDate<=dateS);
  return e ? +e.wage : (+sorted[sorted.length-1]?.wage||0);
}

function roundMinutes(min, unit) {
  if (!unit || unit <= 1) return min;
  return Math.floor(min / unit) * unit;
}

function nightOverlapMin(ss,se,ns,ne) {
  let a=toMin(ss),b=toMin(se),c=toMin(ns),d=toMin(ne);
  if (b<=a) b+=1440;
  if (d<=c) d+=1440;
  let tot=0;
  for (const off of [0,-1440]) {
    const x=Math.max(a,c+off), y2=Math.min(b,d+off);
    if (y2>x) tot+=y2-x;
  }
  return tot;
}

function shiftPay(sh) {
  const wp=D.workplaces.find(w=>w.id===sh.workplaceId);
  if (!wp) return {nh:0,dh:0,np:0,dp:0,gross:0,total:0,allowances:0,deductions:0};
  const wage=getWage(wp,sh.date);
  const end=toMin(sh.endTime), start=toMin(sh.startTime);
  let totalWorkMin = (end <= start ? end + 1440 - start : end - start) - (sh.breakMinutes || 0);
  if (totalWorkMin <= 0) return {nh:0,dh:0,np:0,dp:0,gross:0,total:0,allowances:0,deductions:0};

  let nightMin = 0;
  if (wp.nightWage?.enabled && wp.nightWage.startTime && wp.nightWage.endTime) {
    nightMin = Math.min(nightOverlapMin(sh.startTime, sh.endTime, wp.nightWage.startTime, wp.nightWage.endTime), totalWorkMin);
  }

  let normalMin = Math.max(0, totalWorkMin - nightMin);

  const rUnit = parseInt(wp.roundUnit) || 1;
  if (rUnit > 1) {
    normalMin = roundMinutes(normalMin, rUnit);
    nightMin = roundMinutes(nightMin, rUnit);
  }

  const np = (normalMin / 60) * wage;
  const dp = (nightMin / 60) * (+wp.nightWage?.wage || 0);
  const baseSal = np + dp;

  let dayAllowances = 0;
  if (wp.allowances?.length) {
    wp.allowances.forEach(a => {
      if (a.timing === 'day' && a.mode === 'fix') dayAllowances += (+a.value||0);
    });
  }

  let dayDeductions = 0;
  if (wp.deductions?.length) {
    wp.deductions.forEach(d => {
      if (d.timing === 'day' && d.mode === 'fix') dayDeductions += (+d.value||0);
    });
  }

  const gross = baseSal + dayAllowances;
  const adjustment = sh.adjustment || 0;
  return {nh:normalMin/60,dh:nightMin/60,np,dp,gross,total:gross-dayDeductions+adjustment,allowances:dayAllowances,deductions:dayDeductions,adjustment};
}

function payPeriod(wp,refY,refM,cdEntry) {
  const c=(cdEntry?.cutoffDay ?? wp.cutoffDay) ?? 0;
  if (c===0) return {start:ds(refY,refM,1),end:ds(refY,refM,daysInMonth(refY,refM)),payDay:cdEntry?.payDay??wp.payDay??25};
  let py=refY, pm=refM-1;
  if (pm<1){pm=12;py--;}
  return {start:ds(py,pm,c+1),end:ds(refY,refM,c),payDay:cdEntry?.payDay??wp.payDay??25};
}

function calcPeriodSummary(wp, start, end) {
  const periodShifts = D.shifts.filter(s => s.workplaceId === wp.id && s.date >= start && s.date <= end);
  let workDays = 0, nh = 0, dh = 0, np = 0, dp = 0, totalAdjustment = 0;
  
  periodShifts.forEach(s => {
    const x = shiftPay(s);
    workDays++; nh += x.nh; dh += x.dh; np += x.np; dp += x.dp;
    totalAdjustment += (s.adjustment || 0);
  });

  const timeSalaryTotal = np + dp;

  let totalAllowances = 0;
  let allowanceDetails = [];
  if (wp.allowances?.length) {
    wp.allowances.forEach(a => {
      let amt = 0;
      if (a.timing === 'day') {
        if (a.mode === 'fix') amt = (+a.value || 0) * workDays;
      } else {
        if (a.mode === 'fix') amt = (+a.value || 0);
        else if (a.mode === 'pct') amt = timeSalaryTotal * ((+a.value || 0) / 100);
      }
      if (amt > 0) {
        totalAllowances += amt;
        allowanceDetails.push({ name: a.name, value: amt });
      }
    });
  }

  const gross = timeSalaryTotal + totalAllowances;

  let totalDeductions = 0;
  let deductionDetails = [];
  if (wp.deductions?.length) {
    wp.deductions.forEach(d => {
      let amt = 0;
      if (d.timing === 'day') {
        if (d.mode === 'fix') amt = (+d.value || 0) * workDays;
      } else {
        if (d.mode === 'fix') amt = (+d.value || 0);
        else if (d.mode === 'pct') amt = gross * ((+d.value || 0) / 100);
      }
      if (amt > 0) {
        totalDeductions += amt;
        deductionDetails.push({ name: d.name, value: amt });
      }
    });
  }

  const netPay = Math.max(0, gross - totalDeductions + totalAdjustment);

  return {
    workDays, nh, dh, np, dp, gross, netPay,
    allowances: totalAllowances, deductions: totalDeductions,
    allowanceDetails, deductionDetails, totalAdjustment
  };
}

function periodNetPay(wpId,start,end) {
  const wp=D.workplaces.find(w=>w.id===wpId);
  if (!wp) return 0;
  return calcPeriodSummary(wp, start, end).netPay;
}

function periodTotal(wpId,start,end) {
  const wp=D.workplaces.find(w=>w.id===wpId);
  if (!wp) return 0;
  return calcPeriodSummary(wp, start, end).gross;
}

document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick=()=>{
    const now = Date.now();
    if (btn.dataset.tab==='calendar') {
      if (now - calTabLastTap < 400) {
        const t = new Date();
        S.y = t.getFullYear(); S.m = t.getMonth()+1; S.sel = todayStr();
        closeDayDetail();
      }
      calTabLastTap = now;
    }

});

// ===== CALENDAR =====
// セル全体を再描画せずに選択状態（.sel クラス）だけを付け替える
function updateSelCell(dstr) {
  document.querySelectorAll('#cal-grid .cal-cell').forEach(cell => {
    if (cell.dataset.date === dstr) {
      cell.classList.add('sel');
    } else {
      cell.classList.remove('sel');
    }
  });
}

function renderCal() {
  document.getElementById('month-title').textContent=`${S.y}年 ${S.m}月`;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const todS=todayStr();
  const first=new Date(S.y,S.m-1,1).getDay();
  const last=daysInMonth(S.y,S.m);

  function makeCell(cy,cm,cd,other) {
    const dstr=ds(cy,cm,cd);
    const dow=new Date(cy,cm-1,cd).getDay();
    const cell=document.createElement('div');
    cell.className='cal-cell'+(other?' other':'')+(dstr===S.sel?' sel':'')+(dstr===todS?' tod':'')
      +(dow===0?' sun':'')+(dow===6?' sat':'');
    cell.dataset.date = dstr;
    const num=document.createElement('div'); num.className='cal-day'; num.textContent=cd;
    cell.appendChild(num);
    const dayShifts=D.shifts.filter(s=>s.date===dstr);
    if (dayShifts.length) {
      const wrap=document.createElement('div'); wrap.className='cal-badges';
      dayShifts.forEach(sh=>{
        const fh=t=>{const[h,m]=t.split(':').map(Number);return m===0?String(h):`${h}${String(m).padStart(2,'0')}`;}
        const b=document.createElement('div'); b.className='cal-badge';
        b.style.background=sh.color||'#ec4899';
        const titleChars = Array.from(sh.title || '？');
        const titleChar = titleChars[0] || '?';
        b.innerHTML=`<span class="badge-t">${titleChar}</span><span class="badge-time">${fh(sh.startTime)}-${fh(sh.endTime)}</span>`;
        wrap.appendChild(b);
      });
      cell.appendChild(wrap);
    }
    
    // カレンダーマスのタップイベント
    cell.onclick=(e)=>{
      // マス内の文字やバッジをタップした際も親要素(cell)のイベントとして確実に発火させる
      const now=Date.now();
      const isDouble=lastTap.date===dstr&&now-lastTap.time<400;
      lastTap={date:dstr,time:now};
      S.sel=dstr;
      // renderCal() を呼ばず、.sel クラスの付け替えと下部サマリーの更新のみ行う
      updateSelCell(dstr);
      renderSummary();
      
      if (isDouble) { 
        closeDayDetail(); 
        openBS(dstr); 
      } else {
        const hasShifts = D.shifts.some(s=>s.date===dstr);
        if (hasShifts) {
          // シフトがある日：画面を閉じずに中身だけをサクサク書き換え
          openDayDetail(dstr);
        } else {
          // シフトがない日：詳細画面を閉じる
          closeDayDetail();
        }
      }
    };
    return cell;
  }

  for (let i=0;i<first;i++){
    const d=new Date(S.y,S.m-1,-first+1+i);
    grid.appendChild(makeCell(d.getFullYear(),d.getMonth()+1,d.getDate(),true));
  }
  for (let d=1;d<=last;d++) grid.appendChild(makeCell(S.y,S.m,d,false));
  const endDow=new Date(S.y,S.m-1,last).getDay();
  for (let i=1;i<=6-endDow;i++){
    const d=new Date(S.y,S.m,i);
    grid.appendChild(makeCell(d.getFullYear(),d.getMonth()+1,d.getDate(),true));
  }
}

// ===== SUMMARY =====
function renderSummary() {
  const sel=S.sel, todS=todayStr();
  const dayShifts=D.shifts.filter(s=>s.date===sel);
  
  let dayNet = 0, dayGross = 0;
  dayShifts.forEach(s => {
    const p = shiftPay(s);
    dayNet += p.total;
    dayGross += p.gross;
  });

  let toDateNet=0, forecastNet=0, toDateGross=0, forecastGross=0;
  D.workplaces.forEach(wp=>{
    const cdList = wp.cutoffDays?.length ? wp.cutoffDays : [{cutoffDay: wp.cutoffDay??0, payDay: wp.payDay??25}];
    cdList.forEach(cd => {
      const p=payPeriod(wp,S.y,S.m,cd);
      const todEnd=todS<p.end?todS:p.end;
      if (todS>=p.start) {
        toDateNet += periodNetPay(wp.id,p.start,todEnd);
        toDateGross += periodTotal(wp.id,p.start,todEnd);
      }
      forecastNet += periodNetPay(wp.id,p.start,p.end);
      forecastGross += periodTotal(wp.id,p.start,p.end);
    });
  });

  const [,mm,dd]=sel?sel.split('-').map(Number):[0,0,0];
  const modeLabel = showGross ? '（総支給）' : '（手取り）';
  document.getElementById('sum-label').textContent = sel ? `${mm}月${dd}日の目安給料` : '日付を選択';
  document.getElementById('sum-day').textContent = fmt(showGross ? dayGross : dayNet);
  document.getElementById('sum-todate-lbl').textContent = `今日までの給料${modeLabel}`;
  document.getElementById('sum-todate').textContent = fmt(showGross ? toDateGross : toDateNet);
  document.getElementById('sum-forecast-lbl').textContent = `今月の見込み${modeLabel}`;
  document.getElementById('sum-forecast').textContent = fmt(showGross ? forecastGross : forecastNet);
  document.getElementById('sum-mode-hint').textContent = showGross
    ? 'ダブルタップで手取りに切り替え ✦'
    : 'ダブルタップで総支給⇔手取り切り替え';
}

  document.getElementById('bs-mask').classList.remove('hidden');

}
function closeBS(){document.getElementById('bs-mask').classList.add('hidden');currentBSDate=null;}
document.getElementById('btn-bs-close').onclick=closeBS;
document.getElementById('add-shift-btn').onclick=()=>{ if(S.sel) openBS(S.sel); };
document.getElementById('bs-mask').onclick=e=>{if(e.target===document.getElementById('bs-mask'))closeBS();};

// サマリーバー ダブルタップで総支給⇔手取り切り替え
let sumLastTap = 0;
document.getElementById('summary-items').addEventListener('click', () => {
  const now = Date.now();
  if (now - sumLastTap < 380) { showGross = !showGross; renderSummary(); }
  sumLastTap = now;
});

document.getElementById('bs-prev-day').onclick=()=>{
  if(!currentBSDate) return;
  const prev=addDay(currentBSDate,-1);
  S.sel=prev; updateSelCell(prev); renderSummary();
  openBS(prev);
};
document.getElementById('bs-next-day').onclick=()=>{
  if(!currentBSDate) return;
  const next=addDay(currentBSDate,1);
  S.sel=next; updateSelCell(next); renderSummary();
  openBS(next);
};

function renderBSContent(dstr) {
  const reg=document.getElementById('bs-registered'); reg.innerHTML='';
  const dayShifts=D.shifts.filter(s=>s.date===dstr);
  if (dayShifts.length){
    const lbl=document.createElement('div');lbl.className='bs-sec-lbl';lbl.textContent='登録済みシフト';
    reg.appendChild(lbl);
    dayShifts.forEach(sh=>{
      const p=shiftPay(sh);
      const row=document.createElement('div'); row.className='bs-reg-row';
      row.innerHTML=`<span class="bs-reg-dot" style="background:${sh.color||'#ec4899'}"></span>
        <div class="bs-reg-info">
          <div class="bs-reg-name">${sh.title||'シフト'}</div>
          <div class="bs-reg-time">${sh.startTime}〜${sh.endTime}（休憩${sh.breakMinutes||0}分）</div>
        </div>
        <div class="bs-reg-pay">${fmt(p.total)}</div>
        <button class="bs-del-btn" data-id="${sh.id}">🗑</button>`;
      row.querySelector('.bs-del-btn').onclick=e=>{
        e.stopPropagation();
        D.shifts=D.shifts.filter(s=>s.id!==sh.id);
        save(); renderBSContent(dstr); renderCal(); renderSummary();
      };
      reg.appendChild(row);
    });
  }
  const body=document.getElementById('bs-body'); body.innerHTML='';
  if (D.templates.length){
    const lbl=document.createElement('div');lbl.className='bs-sec-lbl';lbl.textContent='テンプレートから追加';
    body.appendChild(lbl);
    const grid=document.createElement('div'); grid.className='bs-tmpl-grid';
    D.templates.forEach(t=>{
      const wp=D.workplaces.find(w=>w.id===t.workplaceId);
      const btn=document.createElement('button'); btn.className='bs-tmpl-btn';
      btn.style.background=t.color||'#ec4899';
      btn.innerHTML=`<div class="bs-tmpl-name">${t.title}</div>
        <div class="bs-tmpl-time">${t.startTime} - ${t.endTime}</div>
        <div class="bs-tmpl-wp">${wp?wp.name:'勤務先未設定'}</div>`;
      btn.onclick=()=>registerFromTemplate(dstr,t);
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  }
  const acts=document.createElement('div'); acts.className='bs-act';
  acts.innerHTML=`<button class="bs-act-btn" id="btn-manual">✏ 手動で入力</button>
    <button class="bs-act-btn" id="btn-new-tmpl">＋ テンプレート追加</button>`;
  body.appendChild(acts);
  document.getElementById('btn-manual').onclick=()=>showManualForm(dstr,body);
  document.getElementById('btn-new-tmpl').onclick=()=>{closeBS();openTemplateModal(null);};
}

function registerFromTemplate(dstr,t){
  D.shifts.push({id:uid(),date:dstr,workplaceId:t.workplaceId,
    title:t.title,color:t.color,startTime:t.startTime,endTime:t.endTime,breakMinutes:t.breakMinutes||0});
  save();
  closeBS(); renderCal(); renderSummary();
  setTimeout(()=>openBS(dstr),160);
}

function showManualForm(dstr,container){
  const existing=container.querySelector('.bs-form');
  if (existing){existing.remove();return;}
  const form=document.createElement('div'); form.className='bs-form';
  const wpOpts=D.workplaces.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');
  form.innerHTML=`
    <div class="bf-row"><label>勤務先</label><select id="mf-wp">${wpOpts||'<option value="">なし</option>'}</select></div>
    <div class="bf-row"><label>タイトル</label><input type="text" id="mf-title" placeholder="シフト名"></div>
    <div class="bf-row"><label>開始</label><input type="time" id="mf-start" value="09:00"></div>
    <div class="bf-row"><label>終了</label><input type="time" id="mf-end" value="17:00"></div>
    <div class="bf-row"><label>休憩</label><input type="number" id="mf-break" value="60" min="0" step="15"><span class="bf-unit">分</span></div>
    <div class="bf-row"><label>調整額</label><input type="number" id="mf-adj" value="0" step="1" placeholder="±円（手当＋/控除－）"><span class="bf-unit">円</span></div>
    <div class="bf-row"><label>メモ</label><input type="text" id="mf-memo" placeholder="任意メモ"></div>
    <button class="btn-bs-save" id="btn-mf-save">登録する ✦</button>`;
  container.insertBefore(form,container.querySelector('.bs-act'));
  document.getElementById('btn-mf-save').onclick=()=>{
    const wpId=document.getElementById('mf-wp').value;
    const wp=D.workplaces.find(w=>w.id===wpId);
    D.shifts.push({id:uid(),date:dstr,workplaceId:wpId,
      title:document.getElementById('mf-title').value||'シフト',
      color:wp?.color||'#ec4899',
      startTime:document.getElementById('mf-start').value,
      endTime:document.getElementById('mf-end').value,
      breakMinutes:parseInt(document.getElementById('mf-break').value)||0,
      adjustment:parseFloat(document.getElementById('mf-adj').value)||0,
      memo:document.getElementById('mf-memo').value||''});
    save();
    closeBS(); renderCal(); renderSummary();
    setTimeout(()=>openBS(dstr),160);
  };
}

// ===== DETAIL TAB =====
function renderDetail() {
  renderDetailCharts();
  renderDetailCards();
}

function renderDetailCharts() {
  const el=document.getElementById('det-charts'); el.innerHTML='';
  if (!D.workplaces.length) return;

  const wpAmounts=D.workplaces.map(wp=>{
    const cdList = wp.cutoffDays?.length ? wp.cutoffDays : [{cutoffDay: wp.cutoffDay??0, payDay: wp.payDay??25}];
    let amount = 0;
    cdList.forEach(cd => {
      const p=payPeriod(wp,S.y,S.m,cd);
      amount += chartShowGross ? periodTotal(wp.id,p.start,p.end) : periodNetPay(wp.id,p.start,p.end);
    });
    return {name:wp.name,color:wp.color||'#ec4899',amount};
  }).filter(x=>x.amount>0);

  const months=[];
  for (let i=5;i>=0;i--){
    let y=S.y, m=S.m-i;
    while(m<1){m+=12;y--;}
    months.push({y,m,label:`${m}月`});
  }

  function makeChartCard(key, title, bodyHTML, doubletapable) {
    const collapsed = (JSON.parse(localStorage.getItem('chart_collapsed')||'{}'))[key];
    const card = document.createElement('div');
    card.className = 'det-chart-card full';
    const modeTag = doubletapable
      ? `<span style="font-size:.58rem;color:#f9a8d4;font-weight:400;margin-left:4px">${chartShowGross?'総支給':'手取り'}</span>`
      : '';
    card.innerHTML = `
      <div class="det-chart-title chart-toggle-row" data-key="${key}">
        <span>${title}${modeTag}</span>
        <span class="chart-toggle-icon">${collapsed ? '▶' : '▼'}</span>
      </div>
      <div class="chart-body${collapsed ? ' chart-collapsed' : ''}">${bodyHTML}</div>`;
    card.querySelector('.chart-toggle-row').onclick = () => {
      const body = card.querySelector('.chart-body');
      const icon = card.querySelector('.chart-toggle-icon');
      const isCollapsed = body.classList.toggle('chart-collapsed');
      icon.textContent = isCollapsed ? '▶' : '▼';
      const state = JSON.parse(localStorage.getItem('chart_collapsed')||'{}');
      state[key] = isCollapsed;
      localStorage.setItem('chart_collapsed', JSON.stringify(state));
    };
    if (doubletapable) {
      let lastTapChart = 0;
      card.addEventListener('click', e => {
        if (e.target.closest('.chart-toggle-row')) return;
        const now = Date.now();
        if (now - lastTapChart < 380) { chartShowGross = !chartShowGross; renderDetailCharts(); }
        lastTapChart = now;
      });
    }
    return card;
  }

  // グラフ順：タイムライン → 日別勤務時間 → 手取り割合 → 過去6ヶ月
  el.appendChild(makeChartCard('timeline', `${S.m}月のシフトタイムライン`, `<div id="det-timeline"></div>`, false));
  el.appendChild(makeChartCard('daily', `${S.m}月の日別勤務時間`, `<canvas id="det-daily"></canvas>`, false));

  if (wpAmounts.length) {
    const modeLabel = chartShowGross ? '総支給' : '手取り';
    const legendRows = wpAmounts.map(x=>`
      <div class="donut-legend-row">
        <span class="donut-legend-dot" style="background:${x.color}"></span>
        <div class="donut-legend-info">
          <span class="donut-legend-name">${x.name}</span>
          <span class="donut-legend-amt">${fmt(x.amount)}</span>
        </div>
      </div>`).join('');
    el.appendChild(makeChartCard('donut', `${S.m}月の${modeLabel}・割合`,
      `<div class="donut-wrap"><canvas id="det-donut"></canvas><div class="donut-legend">${legendRows}</div></div>`, true));
  }

  el.appendChild(makeChartCard('bar', `過去6ヶ月の${chartShowGross?'総支給':'手取り'}推移`, `<canvas id="det-bar"></canvas>`, true));
  el.style.paddingBottom='10px';

  if (charts.pie) charts.pie.destroy();
  if (charts.bar) charts.bar.destroy();
  if (charts.daily) charts.daily.destroy();

  if (wpAmounts.length) {
    charts.pie=new Chart(document.getElementById('det-donut'),{
      type:'doughnut',
      data:{labels:wpAmounts.map(x=>x.name),
        datasets:[{data:wpAmounts.map(x=>x.amount),
          backgroundColor:wpAmounts.map(x=>x.color),
          borderWidth:2,borderColor:'white'}]},
      options:{plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)}`}}},
        cutout:'55%',maintainAspectRatio:true}
    });
  }

  const datasets=D.workplaces.map(wp=>({
    label:wp.name,
    data:months.map(({y,m})=>{
      const cdList = wp.cutoffDays?.length ? wp.cutoffDays : [{cutoffDay: wp.cutoffDay??0, payDay: wp.payDay??25}];
      let total = 0;
      cdList.forEach(cd => {
        const p=payPeriod(wp,y,m,cd);
        total += chartShowGross ? periodTotal(wp.id,p.start,p.end) : periodNetPay(wp.id,p.start,p.end);
      });
      return total;
    }),
    backgroundColor:wp.color||'#ec4899',borderRadius:4,
  }));
  charts.bar=new Chart(document.getElementById('det-bar'),{
    type:'bar',
    data:{labels:months.map(x=>x.label),datasets},
    options:{plugins:{legend:{display:false},
      tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},
      scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true,
        ticks:{callback:v=>`¥${(v/10000).toFixed(0)}万`,font:{size:9}}}},
      maintainAspectRatio:true}
  });

  const dim=daysInMonth(S.y,S.m);
  const labels=Array.from({length:dim},(_,i)=>String(i+1));
  const dailyDatasets=D.workplaces.map(wp=>{
    const list=D.shifts.filter(s=>s.workplaceId===wp.id&&s.date.startsWith(`${S.y}-${String(S.m).padStart(2,'0')}`));
    const data=labels.map((_,i)=>{
      const dstr=ds(S.y,S.m,i+1);
      const sh=list.find(s=>s.date===dstr);
      if (!sh) return 0;
      
      const end=toMin(sh.endTime),start=toMin(sh.startTime);
      let tMin = (end<=start?end+1440-start:end-start)-(sh.breakMinutes||0);
      const rUnit = parseInt(wp.roundUnit) || 1;
      if (rUnit > 1) tMin = roundMinutes(tMin, rUnit);
      return tMin / 60;
    });
    return {label:wp.name,data,backgroundColor:wp.color||'#ec4899',borderRadius:3};
  });
  charts.daily=new Chart(document.getElementById('det-daily'),{
    type:'bar',
    data:{labels,datasets:dailyDatasets},
    options:{plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:8,boxWidth:10}},
      tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.raw.toFixed(1)}h`}}},
      scales:{x:{stacked:true,ticks:{font:{size:9}}},y:{stacked:true,beginAtZero:true,
        ticks:{callback:v=>`${v}h`,font:{size:9}}}},
      maintainAspectRatio:true}
  });
  renderTimeline();
}

function renderTimeline() {
  const el = document.getElementById('det-timeline');
  if (!el) return;
  const DOW = ['日','月','火','水','木','金','土'];
  const RRANGE = 1440;
  const gridHTML = [6,12,18].map(h => `<div class="tl-grid" style="left:${h/24*100}%"></div>`).join('');

  const dim = daysInMonth(S.y, S.m);
  const rowsHTML = Array.from({length: dim}, (_,i) => {
    const date = ds(S.y, S.m, i+1);
    const d = new Date(date+'T00:00:00');
    const dow = DOW[d.getDay()];
    const isRed = d.getDay()===0, isSat = d.getDay()===6;
    const dayShifts = D.shifts.filter(s=>s.date===date);
    const prevDate = addDay(date, -1);
    const overShifts = D.shifts.filter(s => {
      if (s.date !== prevDate) return false;
      return toMin(s.endTime) <= toMin(s.startTime);
    });

    const barsHTML = [
      ...overShifts.map(s => {
        const end = toMin(s.endTime);
        const barWidth = end / RRANGE * 100;
        return `<div class="tl-bar tl-bar-cont-left" style="left:0%;width:${Math.max(.5,barWidth).toFixed(1)}%;background:${s.color||'#ec4899'}" title="${s.title||''} 〜${s.endTime}"><span class="tl-bar-ov" style="left:2px;right:auto">‹</span></div>`;
      }),
      ...dayShifts.map(s => {
        const start = toMin(s.startTime);
        let end = toMin(s.endTime);
        if (end <= start) end += 1440;
        const barLeft = start / RRANGE * 100;
        const barWidth = Math.min(100-barLeft, (Math.min(end,1440)-start)/RRANGE*100);
        const over = end > 1440;
        return `<div class="tl-bar" style="left:${barLeft.toFixed(1)}%;width:${Math.max(.5,barWidth).toFixed(1)}%;background:${s.color||'#ec4899'}">${over?'<span class="tl-bar-ov">›</span>':''}</div>`;
      }),
    ].join('');
    return `<div class="tl-row">
      <div class="tl-dc${isRed?' tl-sun':isSat?' tl-sat':''}">${S.m}/${i+1}<span class="tl-dow">${dow}</span></div>
      <div class="tl-ba">${gridHTML}${barsHTML}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="tl-wrap">
      <div class="tl-ax"><div class="tl-axl"></div><div class="tl-ticks">${[0,6,12,18,24].map(h=>`<span class="tl-tick" style="left:${h/24*100}%">${h}</span>`).join('')}</div></div>
      ${rowsHTML}
    </div>`;
}

        <div class="det-row"><span class="lbl">通常給料</span><span class="val">${fmt(res.np)}</span></div>

      const subOpen = card.querySelector('.det-period-open');
      const subCollapsed = card.querySelector('.det-head-sub');
      const nowCollapsed = body.classList.toggle('hidden');

      subOpen.classList.toggle('hidden', nowCollapsed);
      localStorage.setItem(colKey, nowCollapsed ? '1' : '0');
    };

    const sltKey = `slt_${cardId}`;
    const sltOpen = localStorage.getItem(sltKey) === '1';
    const sltBtn = card.querySelector(`#slt-${cardId}`);
    const slBody = card.querySelector(`#slb-${cardId}`);

    sltBtn.onclick = e => {
      e.stopPropagation();
      const nowOpen = slBody.classList.toggle('hidden') === false;
      sltBtn.querySelector('.slt-icon').textContent = nowOpen ? '▼' : '▶';
      localStorage.setItem(sltKey, nowOpen ? '1' : '0');
    };

    el.appendChild(card);
  }); // cdList forEach
  }); // workplaces forEach
}

  openModal(isNew?'勤務先を追加':'勤務先を編集',body,foot=>{
    let color=selColor;
    bindSwatches(document.getElementById('modal-body'),c=>color=c);
    
    const allowsContainer = document.getElementById('wm-allows');
    const deductsContainer = document.getElementById('wm-deducts');

    if (wp) {
      if (wp.allowances?.length) {
        wp.allowances.forEach(a => allowsContainer.appendChild(createDynamicItemRow('allow', a)));
      } else if (wp.transportFee) {
        allowsContainer.appendChild(createDynamicItemRow('allow', {name:'交通費', timing:'day', mode:'fix', value:wp.transportFee}));
      }

      if (wp.deductions?.length) {
        wp.deductions.forEach(d => deductsContainer.appendChild(createDynamicItemRow('deduct', d)));
      } else {
        if (wp.dailyDeduction) deductsContainer.appendChild(createDynamicItemRow('deduct', {name:'日々控除', timing:'day', mode:'fix', value:wp.dailyDeduction}));
        if (wp.socialInsuranceRate) deductsContainer.appendChild(createDynamicItemRow('deduct', {name:'社会保険料', timing:'month', mode:'pct', value:wp.socialInsuranceRate}));

    }

    document.getElementById('btn-add-allow').onclick = () => allowsContainer.appendChild(createDynamicItemRow('allow'));
    document.getElementById('btn-add-deduct').onclick = () => deductsContainer.appendChild(createDynamicItemRow('deduct'));

    // 複数締め日 - 削除・追加
    const cutoffsContainer = document.getElementById('wm-cutoffs');
    function updateCutoffDelBtns() {
      const items = cutoffsContainer.querySelectorAll('.cutoff-item');
      items.forEach(item => {
        const btn = item.querySelector('.btn-rco');
        if (btn) btn.style.display = items.length > 1 ? '' : 'none';
      });
    }
    cutoffsContainer.querySelectorAll('.btn-rco').forEach(b => b.onclick = () => { b.closest('.cutoff-item').remove(); updateCutoffDelBtns(); });
    document.getElementById('btn-add-cutoff').onclick = () => {
      const div = document.createElement('div');
      div.innerHTML = makeCutoffRowHTML({cutoffDay:20, payDay:25}, true);
      const newItem = div.firstElementChild;
      newItem.querySelector('.btn-rco').onclick = () => { newItem.remove(); updateCutoffDelBtns(); };
      cutoffsContainer.appendChild(newItem);
      updateCutoffDelBtns();
    };
    updateCutoffDelBtns();

    document.getElementById('wm-ne').onchange=e=>{document.getElementById('wm-nf').style.display=e.target.checked?'':'none';};
    document.getElementById('btn-awage').onclick=()=>{
      const wagesEl=document.getElementById('wm-wages');
      const div=document.createElement('div'); div.className='wh-item';
      div.innerHTML=`<input type="date" class="fi wh-d" style="flex:1.4" value="${todayStr()}">
        <input type="number" class="fi wh-w" style="flex:1" placeholder="時給">
        <span style="font-size:.75rem;color:#be185d">円〜</span>
        <button class="btn-rwage">✕</button>`;
      div.querySelector('.btn-rwage').onclick=()=>div.remove();
      wagesEl.appendChild(div);
    };
    document.getElementById('wm-wages').querySelectorAll('.btn-rwage').forEach(b=>b.onclick=()=>b.closest('.wh-item').remove());
    
    if (!isNew){
      const db=document.createElement('button'); db.className='btn-del'; db.textContent='削除';
      db.onclick=()=>{if(!confirm('この勤務先を削除しますか？'))return;D.workplaces=D.workplaces.filter(w=>w.id!==wpId);save();closeModal();renderSettings();};
      foot.appendChild(db);
    }
    
    const sb=document.createElement('button'); sb.className='btn-save'; sb.textContent='保存';
    sb.onclick=()=>{
      const name=document.getElementById('wm-name').value.trim();
      if(!name){alert('勤務先名を入力してください');return;}
      
      const wh=[];
      document.querySelectorAll('#wm-wages .wh-item').forEach(item=>{
        const d=item.querySelector('.wh-d').value;
        const w=parseFloat(item.querySelector('.wh-w').value);
        if(d&&!isNaN(w)) wh.push({startDate:d,wage:w});
      });
      wh.sort((a,b)=>a.startDate.localeCompare(b.startDate));

      // 複数締め日を収集
      const cutoffDays = [];
      cutoffsContainer.querySelectorAll('.cutoff-item').forEach(el => {
        const c = parseInt(el.querySelector('.cd-cut').value);
        const p = parseInt(el.querySelector('.cd-pay').value);
        cutoffDays.push({ cutoffDay: c, payDay: p });
      });

      const allowances = [];
      allowsContainer.querySelectorAll('.dyn-item').forEach(el => {
        const n = el.querySelector('.dyn-name').value.trim() || '手当';
        const t = el.querySelector('.dyn-timing').value;
        const m = el.querySelector('.dyn-mode').value;
        const v = parseFloat(el.querySelector('.dyn-value').value) || 0;
        allowances.push({ name: n, timing: t, mode: m, value: v });
      });

      const deductions = [];
      deductsContainer.querySelectorAll('.dyn-item').forEach(el => {
        const n = el.querySelector('.dyn-name').value.trim() || '控除';
        const t = el.querySelector('.dyn-timing').value;
        const m = el.querySelector('.dyn-mode').value;
        const v = parseFloat(el.querySelector('.dyn-value').value) || 0;
        deductions.push({ name: n, timing: t, mode: m, value: v });
      });

      const obj={id:wpId||uid(),name,color,
        cutoffDay: cutoffDays[0]?.cutoffDay ?? 20,
        payDay: cutoffDays[0]?.payDay ?? 25,
        cutoffDays,
        roundUnit:document.getElementById('wm-round').value,
        wageHistory:wh,
        nightWage:{enabled:document.getElementById('wm-ne').checked,
          startTime:document.getElementById('wm-ns').value,
          endTime:document.getElementById('wm-ne2').value,
          wage:parseFloat(document.getElementById('wm-nw').value)||0},
        allowances,
        deductions
      };
      
      if(isNew) D.workplaces.push(obj);
      else {const i=D.workplaces.findIndex(w=>w.id===wpId);D.workplaces[i]=obj;}
      save();closeModal();renderSettings();
    };
    foot.appendChild(sb);
  });
}

// ===== DAY DETAIL SHEET =====
const ddSheet = document.getElementById('dd-sheet');

// 閉じアニメーション中のタイマーID。openDayDetail 呼び出し時にキャンセルする
let ddCloseTimer = null;

function fillDayDetail(dstr) {
  const [y, m, d] = dstr.split('-').map(Number);
  const dow = ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  const dayTotal = D.shifts.filter(s=>s.date===dstr).reduce((sum,s)=>sum+shiftPay(s).total,0);
  document.getElementById('dd-head').innerHTML =
    `<span>${m}月${d}日（${dow}）</span><span style="font-size:.95rem;color:#ec4899">${fmt(dayTotal)}</span>`;

  const list = document.getElementById('dd-list');
  list.innerHTML = '';
  D.shifts.filter(s => s.date === dstr).forEach(sh => {
    const wp = D.workplaces.find(w => w.id === sh.workplaceId);
    const pay = shiftPay(sh);
    const wrapper = document.createElement('div');

    const item = document.createElement('div');
    item.className = 'dd-item';
    item.innerHTML = `
      <div class="dd-time">${sh.startTime}<br>${sh.endTime}</div>
      <div class="dd-bar" style="background:${sh.color||'#ec4899'}"></div>
      <div class="dd-info">
        <div class="dd-title">${sh.title||'シフト'}</div>
        <div class="dd-wp">[${wp ? wp.name : '未設定'}]${sh.memo ? ` <span style="color:#aaa">${sh.memo}</span>` : ''}</div>
        ${sh.adjustment ? `<div style="font-size:.7rem;color:${sh.adjustment>0?'#16a34a':'#e11d48'};margin-top:2px;">${sh.adjustment>0?'▲':'▼'} 調整 ${sh.adjustment>0?'+':''}${Math.round(sh.adjustment).toLocaleString('ja-JP')}円</div>` : ''}
      </div>
      <div class="dd-pay">${fmt(pay.total)}</div>
      <button class="dd-pencil" title="編集">✏️</button>`;

    const form = document.createElement('div');
    form.className = 'dd-edit-form hidden';
    const colorSwatchesHTML = COLORS.map(c =>
      `<span class="sw dd-sw${c===sh.color?' on':''}" style="background:${c}" data-c="${c}"></span>`
    ).join('');
    form.innerHTML = `
      <div class="dd-ef-row"><label>名前</label><input type="text" class="dd-ef-in" id="ef-title-${sh.id}" value="${sh.title||''}"></div>
      <div class="dd-ef-row"><label>カラー</label><div class="swatches" id="ef-swatches-${sh.id}">${colorSwatchesHTML}</div></div>
      <div class="dd-ef-row"><label>開始</label><input type="time" class="dd-ef-in" id="ef-start-${sh.id}" value="${sh.startTime}"></div>
      <div class="dd-ef-row"><label>終了</label><input type="time" class="dd-ef-in" id="ef-end-${sh.id}" value="${sh.endTime}"></div>
      <div class="dd-ef-row"><label>休憩</label><input type="number" class="dd-ef-in" id="ef-break-${sh.id}" value="${sh.breakMinutes||0}" min="0" step="15"><span class="dd-ef-unit">分</span></div>
      <div class="dd-ef-row"><label>調整額</label><input type="number" class="dd-ef-in" id="ef-adj-${sh.id}" value="${sh.adjustment||0}" step="1"><span class="dd-ef-unit">円</span></div>
      <div class="dd-ef-row"><label>メモ</label><input type="text" class="dd-ef-in" id="ef-memo-${sh.id}" value="${sh.memo||''}" placeholder="任意メモ"></div>
      <div class="dd-ef-btns">
        <button class="dd-ef-del">🗑 削除</button>
        <button class="dd-ef-cancel">キャンセル</button>
        <button class="dd-ef-save">保存</button>
      </div>`;

    let editColor = sh.color || COLORS[0];
    form.querySelectorAll('.dd-sw').forEach(sw => {
      sw.onclick = () => {
        form.querySelectorAll('.dd-sw').forEach(s => s.classList.remove('on'));
        sw.classList.add('on');
        editColor = sw.dataset.c;
      };
    });

    item.querySelector('.dd-pencil').onclick = e => {
      e.stopPropagation();
      form.classList.toggle('hidden');
    };
    form.querySelector('.dd-ef-cancel').onclick = () => form.classList.add('hidden');
    form.querySelector('.dd-ef-del').onclick = () => {
      if (!confirm('このシフトを削除しますか？')) return;
      D.shifts = D.shifts.filter(s => s.id !== sh.id);
      save();
      if (D.shifts.some(s => s.date === dstr)) openDayDetail(dstr);
      else closeDayDetail();
      renderCal(); renderSummary();
    };
    form.querySelector('.dd-ef-save').onclick = () => {
      sh.title      = document.getElementById(`ef-title-${sh.id}`).value || sh.title;
      sh.color      = editColor;
      sh.startTime  = document.getElementById(`ef-start-${sh.id}`).value;
      sh.endTime    = document.getElementById(`ef-end-${sh.id}`).value;
      sh.breakMinutes = parseInt(document.getElementById(`ef-break-${sh.id}`).value)||0;
      sh.adjustment = parseFloat(document.getElementById(`ef-adj-${sh.id}`).value)||0;
      sh.memo       = document.getElementById(`ef-memo-${sh.id}`).value||'';
      save();
      openDayDetail(dstr);
      renderCal(); renderSummary();
    };

    wrapper.appendChild(item);
    wrapper.appendChild(form);
    list.appendChild(wrapper);
  });
}

function openDayDetail(dstr) {
  // 閉じアニメーション中のタイマーが走っていればキャンセル（hidden付与を防ぐ）
  if (ddCloseTimer !== null) {
    clearTimeout(ddCloseTimer);
    ddCloseTimer = null;
  }

  // 中身を書き換える
  fillDayDetail(dstr);

  // 閉じかけ or 完全に閉じている場合も .show を付与して開く
  if (ddCloseTimer !== null || !ddSheet.classList.contains('show')) {
    // 1フレーム待ってから .show を付与してトランジションを発火
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ddSheet.classList.add('show');
      });
    });
  } else {
    ddSheet.classList.add('show');
  }
}

function closeDayDetail() {
  ddSheet.classList.remove('show');
  ddCloseTimer = setTimeout(() => {
    ddCloseTimer = null;
  }, 300);
}

// dd-mask を廃止したため、マスクのクリック閉じは不要

// 【3の修正】ピンクのつまみ(ハンドル)をタップしたときに完全に連動して閉じる
document.getElementById('dd-handle').onclick = (e) => {
  e.preventDefault();
  e.stopPropagation();
  closeDayDetail();
};

let ddTouchY = 0;
ddSheet.addEventListener('touchstart', e => { ddTouchY = e.touches[0].clientY; }, { passive: true });
ddSheet.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - ddTouchY > 60) closeDayDetail();
}, { passive: true });

const DEFAULT_THEME = { g1:'#fdd5e8', g2:'#f9a8d4', ac:'#ec4899', tx:'#ec5b97' };

function mixColor(hex, ratio) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const mix = c => Math.round(c*(1-ratio)+255*ratio);
  return `#${mix(r).toString(16).padStart(2,'0')}${mix(g).toString(16).padStart(2,'0')}${mix(b).toString(16).padStart(2,'0')}`;
}

function saveTheme(t) { localStorage.setItem('payapp_theme', JSON.stringify(t)); }
function loadTheme() {
  try { return JSON.parse(localStorage.getItem('payapp_theme')) || DEFAULT_THEME; }
  catch(e) { return DEFAULT_THEME; }
}

function initThemeUI() {
  const t = loadTheme();
  applyTheme(t);
  const fields = { g1:'tc-g1', g2:'tc-g2', ac:'tc-ac', tx:'tc-tx' };
  const hexFields = { g1:'th-g1', g2:'th-g2', ac:'th-ac', tx:'th-tx' };
  Object.entries(fields).forEach(([key, id]) => {
    const picker = document.getElementById(id);
    const hexInput = document.getElementById(hexFields[key]);
    if (!picker) return;
    picker.value = t[key];
    hexInput.value = t[key];
    picker.oninput = () => {
      hexInput.value = picker.value;
      const cur = loadTheme(); cur[key] = picker.value;
      saveTheme(cur); applyTheme(cur);
    };
    hexInput.oninput = () => {
      const val = hexInput.value;
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        picker.value = val;
        const cur = loadTheme(); cur[key] = val;
        saveTheme(cur); applyTheme(cur);
      }
    };
  });
  document.getElementById('theme-reset').onclick = () => {
    saveTheme(DEFAULT_THEME);
    applyTheme(DEFAULT_THEME);
    initThemeUI();
  };
}

// ===== TAX TAB =====
let taxYear = new Date().getFullYear();

function calcIncomeTax(annualIncome) {
  // 給与所得控除
  let deduction = 0;
  if (annualIncome <= 1625000) deduction = 550000;
  else if (annualIncome <= 1800000) deduction = annualIncome * 0.4 - 100000;
  else if (annualIncome <= 3600000) deduction = annualIncome * 0.3 + 80000;
  else if (annualIncome <= 6600000) deduction = annualIncome * 0.2 + 440000;
  else if (annualIncome <= 8500000) deduction = annualIncome * 0.1 + 1100000;
  else deduction = 1950000;
  deduction = Math.min(deduction, 1950000);

  return deduction;
}

function calcTaxAmount(taxableIncome) {
  // 所得税率（復興特別所得税2.1%込み）
  const brackets = [
    [1950000, 0.05], [3300000, 0.10], [6950000, 0.20],
    [9000000, 0.23], [18000000, 0.33], [40000000, 0.40], [Infinity, 0.45]
  ];
  let tax = 0, prev = 0;
  for (const [limit, rate] of brackets) {
    if (taxableIncome <= prev) break;
    tax += (Math.min(taxableIncome, limit) - prev) * rate;
    prev = limit;
  }
  // 復興特別所得税
  return Math.floor(tax * 1.021);
}

function getTaxKey(wpId, year, month, cdIdx) {
  // cdIdx省略時は旧形式（後方互換）
  if (cdIdx === undefined || cdIdx === 0) return `${wpId}_${year}_${String(month).padStart(2,'0')}`;
  return `${wpId}_${year}_${String(month).padStart(2,'0')}_cd${cdIdx}`;
}

function getTaxRecord(wpId, year, month, cdIdx) {
  // 新キーで検索、なければ旧キー（cdIdx=0）でもチェック
  const key = getTaxKey(wpId, year, month, cdIdx);
  if (D.taxRecords[key]) return D.taxRecords[key];
  if (cdIdx > 0) {
    const oldKey = getTaxKey(wpId, year, month, 0);
    if (D.taxRecords[oldKey]) return D.taxRecords[oldKey];
  }
  return { income: '', withholding: '', si: '' };
}

function setTaxRecord(wpId, year, month, cdIdx, field, value) {
  const key = getTaxKey(wpId, year, month, cdIdx);
  if (!D.taxRecords[key]) D.taxRecords[key] = { income: '', withholding: '', si: '' };
  D.taxRecords[key][field] = value;
  save();
  renderTaxSummary();
}

// 勤務先の締め日リストを取得（後方互換込み）
function getWpCutoffs(wp) {
  if (wp.cutoffDays?.length) return wp.cutoffDays;
  return [{ cutoffDay: wp.cutoffDay ?? 0, payDay: wp.payDay ?? 25 }];
}

// taxYearに含まれる締め日期間を列挙（給与支払い月＝taxYear内のもの）
function getTaxPeriods(wp) {
  const cdList = getWpCutoffs(wp);
  const periods = [];
  cdList.forEach((cd, cdIdx) => {
    // 1〜12月の各締め日期間を生成
    for (let m = 1; m <= 12; m++) {
      const p = payPeriod(wp, taxYear, m, cd);
      // 期間終了日がtaxYear内のものを対象
      const endYear = parseInt(p.end.slice(0,4));
      if (endYear === taxYear) {
        periods.push({ m, cdIdx, cd, start: p.start, end: p.end, payDay: p.payDay });
      }
    }
  });
  // 重複除去（start/endが同じもの）してソート
  const seen = new Set();
  return periods.filter(p => {
    const k = `${p.cdIdx}_${p.start}_${p.end}`;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  }).sort((a,b) => a.end.localeCompare(b.end) || a.cdIdx - b.cdIdx);
}

function renderTaxSummary() {
  const el = document.getElementById('tax-summary-area');
  if (!el) return;

  let totalIncome = 0, totalWithholding = 0, totalSI = 0;
  D.workplaces.forEach(wp => {
    getTaxPeriods(wp).forEach(({ m, cdIdx }) => {
      const rec = getTaxRecord(wp.id, taxYear, m, cdIdx);
      totalIncome += parseFloat(rec.income) || 0;
      totalWithholding += parseFloat(rec.withholding) || 0;
      totalSI += parseFloat(rec.si) || 0;
    });
  });

  const employmentDeduction = calcIncomeTax(totalIncome);
  const basicDeduction = totalIncome > 0 ? 480000 : 0;
  const taxableIncome = Math.max(0, totalIncome - employmentDeduction - basicDeduction - totalSI);
  const properTax = calcTaxAmount(taxableIncome);
  const diff = properTax - totalWithholding;

  el.innerHTML = `
    <div class="tax-summary-cards">
      <div class="tax-sum-card">
        <div class="tax-sum-lbl">年間総収入（額面）</div>
        <div class="tax-sum-val">${fmt(totalIncome)}</div>
      </div>
      <div class="tax-sum-card">
        <div class="tax-sum-lbl">源泉徴収済み合計</div>
        <div class="tax-sum-val">${fmt(totalWithholding)}</div>
      </div>
      <div class="tax-sum-card">
        <div class="tax-sum-lbl">本来の所得税（推定）</div>
        <div class="tax-sum-val accent">${totalIncome > 0 ? fmt(properTax) : '―'}</div>
      </div>
      <div class="tax-sum-card">
        <div class="tax-sum-lbl">${diff >= 0 ? '追加納税の可能性' : '還付の可能性'}</div>
        <div class="tax-sum-val ${diff > 0 ? 'warn' : diff < 0 ? 'ok' : ''}">${totalIncome > 0 ? (diff >= 0 ? '+' : '') + fmt(diff) : '―'}</div>
      </div>
    </div>
    ${totalIncome > 0 ? `
    <div class="tax-warn-box${diff <= 0 ? ' hidden' : ''}">
      ⚠️ 確定申告で約 ${fmt(diff)} 追加で払う可能性があります。<br>
      来年3月の確定申告期間内に申告してね。
    </div>
    <div class="tax-ok-box${diff > 0 ? ' hidden' : ''}">
      ✓ ${diff < 0 ? `確定申告で約 ${fmt(Math.abs(diff))} 還付される可能性があります。` : '源泉徴収額と本来の税額がほぼ一致しています。'}
    </div>
    <div class="tax-calc-detail">
      <div class="tax-calc-head" id="tax-calc-toggle">
        計算の内訳 <span id="tax-calc-icon">▼</span>
      </div>
      <div class="tax-calc-body" id="tax-calc-body">
        <div class="tax-calc-row"><span class="lbl">年間総収入</span><span class="val">${fmt(totalIncome)}</span></div>
        <div class="tax-calc-row deduct"><span class="lbl">給与所得控除</span><span class="val">－${fmt(employmentDeduction)}</span></div>
        <div class="tax-calc-row deduct"><span class="lbl">基礎控除</span><span class="val">－${fmt(basicDeduction)}</span></div>
        ${totalSI > 0 ? `<div class="tax-calc-row deduct"><span class="lbl">社会保険料控除</span><span class="val">－${fmt(totalSI)}</span></div>` : ''}
        <div class="tax-calc-row total"><span class="lbl">課税所得</span><span class="val">${fmt(taxableIncome)}</span></div>
        <div class="tax-calc-row total"><span class="lbl">本来の所得税（推定）</span><span class="val">${fmt(properTax)}</span></div>
        <div class="tax-calc-row"><span class="lbl">源泉徴収済み</span><span class="val">${fmt(totalWithholding)}</span></div>
        <div class="tax-calc-row total"><span class="lbl">${diff >= 0 ? '不足額（追納）' : '超過額（還付）'}</span><span class="val" style="font-weight:800;color:${diff > 0 ? '#e11d48' : '#16a34a'}">${diff >= 0 ? '+' : ''}${fmt(diff)}</span></div>
      </div>
    </div>` : '<div style="padding:16px;text-align:center;font-size:.83rem;color:#f9a8d4;">各締め日期間の給与明細を入力すると計算されます</div>'}
  `;

  if (totalIncome > 0) {
    const tog = document.getElementById('tax-calc-toggle');
    const body = document.getElementById('tax-calc-body');
    const icon = document.getElementById('tax-calc-icon');
    const colKey = 'tax_calc_collapsed';
    if (localStorage.getItem(colKey) === '1') { body.classList.add('hidden'); icon.textContent = '▶'; }
    tog.onclick = () => {
      const now = body.classList.toggle('hidden');
      icon.textContent = now ? '▶' : '▼';
      localStorage.setItem(colKey, now ? '1' : '0');
    };
  }
}

function renderTax() {
  const el = document.getElementById('tax-content');
  el.innerHTML = '';

  // 年ナビ
  const nav = document.createElement('div');
  nav.className = 'tax-year-nav';
  nav.innerHTML = `<button class="tax-year-btn" id="tax-prev-year">‹</button>
    <span class="tax-year-lbl">${taxYear}年</span>
    <button class="tax-year-btn" id="tax-next-year">›</button>`;
  el.appendChild(nav);
  nav.querySelector('#tax-prev-year').onclick = () => { taxYear--; renderTax(); };
  nav.querySelector('#tax-next-year').onclick = () => { taxYear++; renderTax(); };

  // サマリーエリア
  const summaryArea = document.createElement('div');
  summaryArea.id = 'tax-summary-area';
  el.appendChild(summaryArea);

  if (!D.workplaces.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = '<div class="empty-ico">🌸</div><div class="empty-txt">勤務先を登録してください</div>';
    el.appendChild(empty);
    return;
  }

  renderTaxSummary();

  // 締め日期間別入力セクション
  const sec = document.createElement('div');
  sec.className = 'tax-month-sec';
  const secTitle = document.createElement('div');
  secTitle.className = 'tax-month-sec-title';
  secTitle.textContent = '締め日期間別 給与明細入力';
  sec.appendChild(secTitle);

  // 社会保険加入職場を判定
  function hasSI(wpId) {
    return Object.keys(D.taxRecords).some(k => k.startsWith(wpId + '_') && parseFloat(D.taxRecords[k].si) > 0);
  }

  // 全勤務先の期間をまとめてendDate順で並べる
  const allPeriods = []; // { wp, m, cdIdx, cd, start, end, payDay }
  D.workplaces.forEach(wp => {
    getTaxPeriods(wp).forEach(p => allPeriods.push({ wp, ...p }));
  });
  allPeriods.sort((a, b) => a.end.localeCompare(b.end) || a.wp.name.localeCompare(b.wp.name));

  // end月でグループ化して表示
  const byEndMonth = {};
  allPeriods.forEach(p => {
    const endM = parseInt(p.end.slice(5, 7));
    if (!byEndMonth[endM]) byEndMonth[endM] = [];
    byEndMonth[endM].push(p);
  });

  Object.keys(byEndMonth).sort((a,b)=>+a-+b).forEach(endM => {
    const periods = byEndMonth[endM];

    // カードヘッダー用の月合計
    let monthTotal = 0;
    periods.forEach(({ wp, m, cdIdx }) => {
      monthTotal += parseFloat(getTaxRecord(wp.id, taxYear, m, cdIdx).income) || 0;
    });

    const card = document.createElement('div');
    card.className = 'tax-month-card';
    const colKey = `tax_period_${taxYear}_${endM}`;
    const isOpen = localStorage.getItem(colKey) === '1';

    const head = document.createElement('div');
    head.className = 'tax-month-head';
    head.innerHTML = `<span class="tax-month-lbl">${endM}月締め</span><span class="tax-month-total">${monthTotal > 0 ? fmt(monthTotal) : '―'}</span>`;
    card.appendChild(head);

    const body = document.createElement('div');
    body.className = 'tax-month-body' + (isOpen ? '' : ' hidden');

    periods.forEach(({ wp, m, cdIdx, cd, start, end }) => {
      const rec = getTaxRecord(wp.id, taxYear, m, cdIdx);
      const showSI = hasSI(wp.id) || parseFloat(rec.si) > 0;
      const cdList = getWpCutoffs(wp);
      const periodLabel = cdList.length > 1
        ? `${wp.name}（締め${cdIdx + 1}：${start.slice(5).replace('-','/')}〜${end.slice(5).replace('-','/')}）`
        : `${wp.name}（${start.slice(5).replace('-','/')}〜${end.slice(5).replace('-','/')}）`;

      const row = document.createElement('div');
      row.className = 'tax-wp-row';
      row.innerHTML = `
        <div class="tax-wp-name">
          <span style="width:10px;height:10px;border-radius:50%;background:${wp.color||'#ec4899'};display:inline-block;flex-shrink:0"></span>
          ${periodLabel}
        </div>
        <div class="tax-inp-grid ${showSI ? '' : 'tax-no-si'}">
          <div class="tax-inp-wrap">
            <span class="tax-inp-lbl">額面給与（円）</span>
            <input type="number" class="tax-inp" placeholder="0" value="${rec.income}"
              data-wp="${wp.id}" data-m="${m}" data-cdidx="${cdIdx}" data-field="income">
          </div>
          <div class="tax-inp-wrap">
            <span class="tax-inp-lbl">源泉徴収額（円）</span>
            <input type="number" class="tax-inp" placeholder="0" value="${rec.withholding}"
              data-wp="${wp.id}" data-m="${m}" data-cdidx="${cdIdx}" data-field="withholding">
          </div>
          ${showSI ? `<div class="tax-inp-wrap">
            <span class="tax-inp-lbl">社会保険料（円）</span>
            <input type="number" class="tax-inp si" placeholder="0" value="${rec.si}"
              data-wp="${wp.id}" data-m="${m}" data-cdidx="${cdIdx}" data-field="si">
          </div>` : ''}
        </div>`;
      body.appendChild(row);
    });

    card.appendChild(body);
    head.onclick = () => {
      const now = body.classList.toggle('hidden') === false;
      localStorage.setItem(colKey, now ? '1' : '0');
    };
    sec.appendChild(card);
  });

  el.appendChild(sec);

  // 入力イベント
  el.querySelectorAll('.tax-inp').forEach(inp => {
    inp.oninput = () => {
      const { wp, m, cdidx, field } = inp.dataset;
      setTaxRecord(wp, taxYear, parseInt(m), parseInt(cdidx), field, inp.value);
    };
  });
}
document.getElementById('btn-export').onclick = () => {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fname = `baito_backup_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}.json`;
  const blob = new Blob([JSON.stringify(D, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
};

document.getElementById('btn-import').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const msg = document.getElementById('restore-msg');
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.workplaces || !parsed.shifts) throw new Error('形式が違います');
      D = parsed;
      if (!D.taxRecords) D.taxRecords = {};
      // cutoffDays の互換処理
      D.workplaces.forEach(wp => {
        if (!wp.cutoffDays) {
          wp.cutoffDays = [{ cutoffDay: wp.cutoffDay ?? 0, payDay: wp.payDay ?? 25 }];
        }
      });
      save();
      renderCal(); renderSummary();
      msg.className='restore-msg ok'; msg.textContent='✓ 読み込みました！';
    } catch(err) {
      msg.className='restore-msg err'; msg.textContent='✕ 読み込みに失敗しました: ' + err.message;
    }
    msg.classList.remove('hidden');
    setTimeout(()=>msg.classList.add('hidden'), 4000);
  };
  reader.readAsText(file);
  e.target.value='';
};
(() => {
  const pane = document.getElementById('pane-calendar');
  let tx = 0, ty = 0, moved = false;
  pane.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    moved = false;
  }, { passive: true });
  pane.addEventListener('touchmove', () => { moved = true; }, { passive: true });
  pane.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    if (dx < 0) { S.m++; if(S.m>12){S.m=1;S.y++;} }
    else        { S.m--; if(S.m<1) {S.m=12;S.y--;} }
    onMonthChange();
  }, { passive: true });
})();

initState(); load(); applyTheme(loadTheme()); renderCal(); renderSummary();
